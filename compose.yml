x-api: &api
  build:
    context: .
    dockerfile: Dockerfile
  image: rinha-backend-2026:latest
  restart: unless-stopped
  expose:
    - "9999"
  networks:
    - app-net
  deploy:
    resources:
      limits:
        cpus: "0.45"
        memory: "150MB"

services:
  api-1:
    <<: *api
    container_name: rinha-api-1
    hostname: api-1

  api-2:
    <<: *api
    container_name: rinha-api-2
    hostname: api-2

  lb:
    image: nginx:1.27-alpine
    container_name: rinha-lb
    restart: unless-stopped
    depends_on:
      - api-1
      - api-2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "50MB"

networks:
  app-net:
    driver: bridge
